<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TravelMatch AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    // Leave blank if you want to paste the key into the page UI instead.
    // If you paste a real key here and publish to GitHub Pages, anyone can steal it.
    const HARDCODED_OPENAI_KEY = "sk-VuuBKPh6PojpqlOyCfD3uzLjVtGVdtu17U_hal3JtaT3BlbkFJJWuvsmJFj4PA5XXZoqvpcBYa1Do7Mu3YYGRoTw15IA";

    const preferenceMeta = [
      { key: "views", label: "Views", emoji: "🌄" },
      { key: "history", label: "History", emoji: "🏛️" },
      { key: "food", label: "Food", emoji: "🍜" },
      { key: "events", label: "Events", emoji: "🎉" },
      { key: "activities", label: "Activities", emoji: "🚶" },
      { key: "safety", label: "Safety", emoji: "🛡️" },
      { key: "nightlife", label: "Nightlife", emoji: "🌃" },
      { key: "budget", label: "Budget Friendliness", emoji: "💵" },
    ];

    const initialPreferences = {
      views: 7,
      history: 6,
      food: 8,
      events: 5,
      activities: 6,
      safety: 7,
      nightlife: 4,
      budget: 6,
    };

    const initialAiSettings = {
      model: "gpt-4o-mini",
      temperature: 0.6,
      travelerType: "solo traveler",
      tripLength: "4 days",
      style: "balanced",
      responseLength: "medium",
      extraInstructions: "",
    };

    const imageCache = new Map();

    function makePlaceholder(label) {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800">
          <defs>
            <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#0f172a"/>
              <stop offset="100%" stop-color="#334155"/>
            </linearGradient>
          </defs>
          <rect width="1200" height="800" fill="url(#g)"/>
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
                fill="white" font-family="Arial, sans-serif" font-size="42">
            ${String(label).replace(/[<>&"]/g, "")}
          </text>
        </svg>
      `;
      return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }

    function stripFences(text) {
      if (!text) return "";
      return text.replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/\s*```$/i, "").trim();
    }

    function clampPreference(value) {
      const n = Number(value);
      if (Number.isNaN(n)) return 1;
      return Math.max(1, Math.min(10, n));
    }

    async function fetchWikimediaImage(query) {
      if (!query || !query.trim()) return makePlaceholder("TravelMatch");
      const key = query.trim().toLowerCase();
      if (imageCache.has(key)) return imageCache.get(key);

      const search = encodeURIComponent(query.trim());
      const url =
        `https://commons.wikimedia.org/w/api.php` +
        `?action=query` +
        `&generator=search` +
        `&gsrsearch=${search}` +
        `&gsrnamespace=6` +
        `&gsrlimit=1` +
        `&prop=imageinfo` +
        `&iiprop=url` +
        `&iiurlwidth=1200` +
        `&format=json` +
        `&origin=*`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        const pages = data?.query?.pages ? Object.values(data.query.pages) : [];
        const image = pages?.[0]?.imageinfo?.[0]?.thumburl || pages?.[0]?.imageinfo?.[0]?.url;
        const finalUrl = image || makePlaceholder(query);
        imageCache.set(key, finalUrl);
        return finalUrl;
      } catch (err) {
        const fallback = makePlaceholder(query);
        imageCache.set(key, fallback);
        return fallback;
      }
    }

    async function hydrateCardImages(destinations) {
      return Promise.all(
        destinations.map(async (dest) => {
          if (dest.heroImage) return dest;
          const heroImage = await fetchWikimediaImage(dest.heroImageQuery || `${dest.city} ${dest.country} skyline`);
          return { ...dest, heroImage };
        })
      );
    }

    async function hydrateOneDestination(destination) {
      if (!destination || destination._hydrated) return destination;

      const heroImage = destination.heroImage || await fetchWikimediaImage(destination.heroImageQuery || `${destination.city} ${destination.country} skyline`);

      const hydrateItems = async (items, defaultSuffix) => {
        const list = Array.isArray(items) ? items : [];
        return Promise.all(
          list.map(async (item) => {
            if (item.image) return item;
            const q =
              item.imageQuery ||
              `${destination.city} ${destination.country} ${item.name || item.type || defaultSuffix}`;
            const image = await fetchWikimediaImage(q);
            return { ...item, image };
          })
        );
      };

      const landmarks = await hydrateItems(destination.landmarks, "landmark");
      const transportation = await hydrateItems(destination.transportation, "transport");
      const stays = await hydrateItems(destination.stays, "hotel");
      const foods = await hydrateItems(destination.foods, "food");
      const activities = await hydrateItems(destination.activities, "activity");

      return {
        ...destination,
        heroImage,
        landmarks,
        transportation,
        stays,
        foods,
        activities,
        _hydrated: true,
      };
    }

    function normalizePlan(raw) {
      const destinations = Array.isArray(raw?.destinations) ? raw.destinations.slice(0, 3) : [];

      return {
        tripSummary: raw?.tripSummary || "TravelMatch generated a dynamic recommendation set based on your preferences.",
        itineraryTitle: raw?.itineraryTitle || "Suggested Trip Plan",
        itinerary: raw?.itinerary || "No itinerary returned.",
        featuredIndex: Math.max(0, Math.min(destinations.length - 1, Number(raw?.featuredIndex || 0))),
        destinations: destinations.map((d, idx) => ({
          id: `${(d.city || "destination").toLowerCase().replace(/\s+/g, "-")}-${idx}`,
          city: d.city || "Recommended destination",
          country: d.country || "",
          score: Number(d.score || 0),
          tagline: d.tagline || "",
          whyMatch: d.whyMatch || "",
          highlights: Array.isArray(d.highlights) ? d.highlights.slice(0, 5) : [],
          heroImageQuery: d.heroImageQuery || `${d.city || "travel destination"} skyline famous landmark`,
          landmarks: Array.isArray(d.landmarks) ? d.landmarks.slice(0, 4) : [],
          transportation: Array.isArray(d.transportation) ? d.transportation.slice(0, 3) : [],
          stays: Array.isArray(d.stays) ? d.stays.slice(0, 3) : [],
          foods: Array.isArray(d.foods) ? d.foods.slice(0, 3) : [],
          activities: Array.isArray(d.activities) ? d.activities.slice(0, 3) : [],
        })),
      };
    }

    async function generateTravelPlan({ apiKey, preferences, aiSettings }) {
      const prompt = `
You are TravelMatch AI, a travel recommendation assistant.

Task:
Use the user's weighted preferences to recommend exactly 3 destinations anywhere in the world.
Do NOT use placeholders. Make real, specific recommendations.
The destinations should be meaningfully different from one another if possible.

User preference weights (1-10):
${preferenceMeta.map((p) => `- ${p.label}: ${preferences[p.key]}`).join("\n")}

User AI settings:
- Traveler type: ${aiSettings.travelerType}
- Trip length: ${aiSettings.tripLength}
- Style: ${aiSettings.style}
- Response length: ${aiSettings.responseLength}
- Extra instructions: ${aiSettings.extraInstructions || "None"}

Return JSON only, with this exact structure:
{
  "tripSummary": "one paragraph",
  "featuredIndex": 0,
  "itineraryTitle": "short title",
  "itinerary": "one concise trip plan for the featured destination, structured in readable paragraphs",
  "destinations": [
    {
      "city": "string",
      "country": "string",
      "score": 0,
      "tagline": "one sentence",
      "whyMatch": "2-4 sentences explaining the fit",
      "highlights": ["item 1", "item 2", "item 3", "item 4"],
      "heroImageQuery": "search query for a famous view or skyline",
      "landmarks": [
        { "name": "string", "type": "landmark", "note": "1 sentence", "imageQuery": "search query for this landmark" }
      ],
      "transportation": [
        { "name": "string", "type": "transit/arrival/local", "note": "1 sentence", "imageQuery": "representative photo query" }
      ],
      "stays": [
        { "name": "string", "type": "hotel/ryokan/guesthouse/boutique/etc", "note": "1 sentence", "imageQuery": "representative stay image query" }
      ],
      "foods": [
        { "name": "string", "type": "cuisine/street food/dessert/etc", "note": "1 sentence", "imageQuery": "representative food photo query" }
      ],
      "activities": [
        { "name": "string", "type": "activity/event/scenic/history/etc", "note": "1 sentence", "imageQuery": "representative image query" }
      ]
    }
  ]
}

Requirements:
- Prioritize actual fit to the user's weighted preferences.
- Use real destinations.
- For landmarks, choose famous views/sites.
- For stays, foods, and activities, suggest representative, plausible options.
- Keep the JSON compact and clean.
`;

      const body = {
        model: aiSettings.model,
        temperature: Number(aiSettings.temperature),
        response_format: { type: "json_object" },
        messages: [
          {
            role: "system",
            content:
              "You are a precise travel recommendation engine. You must return valid JSON only. No markdown. No code fences."
          },
          {
            role: "user",
            content: prompt
          }
        ]
      };

      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data?.error?.message || "OpenAI request failed.");
      }

      const content = data?.choices?.[0]?.message?.content;
      if (!content) {
        throw new Error("No content returned from OpenAI.");
      }

      const parsed = JSON.parse(stripFences(content));
      return normalizePlan(parsed);
    }

    function SectionGrid({ title, description, items }) {
      if (!items || items.length === 0) return null;

      return (
        <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
          <h3 className="text-2xl font-semibold">{title}</h3>
          <p className="mt-1 text-sm text-slate-600">{description}</p>
          <div className="mt-5 grid gap-5 md:grid-cols-2 xl:grid-cols-3">
            {items.map((item, idx) => (
              <div key={`${item.name || item.type}-${idx}`} className="overflow-hidden rounded-2xl border border-slate-200 bg-white">
                <img
                  src={item.image || makePlaceholder(item.name || title)}
                  alt={item.name || title}
                  className="h-44 w-full object-cover"
                />
                <div className="p-4">
                  <div className="flex items-start justify-between gap-3">
                    <h4 className="font-semibold text-slate-900">{item.name}</h4>
                    <span className="rounded-full bg-slate-100 px-2.5 py-1 text-xs text-slate-600">
                      {item.type}
                    </span>
                  </div>
                  <p className="mt-3 text-sm leading-6 text-slate-600">{item.note}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [apiKeyInput, setApiKeyInput] = useState("");
      const [preferences, setPreferences] = useState(initialPreferences);
      const [aiSettings, setAiSettings] = useState(initialAiSettings);
      const [plan, setPlan] = useState(null);
      const [selectedIndex, setSelectedIndex] = useState(0);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const activeDestination = plan?.destinations?.[selectedIndex] || null;

      const topPreferenceText = useMemo(() => {
        const sorted = [...preferenceMeta]
          .map((p) => ({ label: p.label, value: preferences[p.key] }))
          .sort((a, b) => b.value - a.value)
          .slice(0, 3);
        return sorted.map((x) => `${x.label} (${x.value})`).join(", ");
      }, [preferences]);

      const handlePreferenceChange = (key, value) => {
        setPreferences((prev) => ({ ...prev, [key]: clampPreference(value) }));
      };

      const handleAiSettingChange = (key, value) => {
        setAiSettings((prev) => ({ ...prev, [key]: value }));
      };

      const handleGenerate = async () => {
        setLoading(true);
        setError("");
        setPlan(null);

        const apiKey = apiKeyInput.trim() || HARDCODED_OPENAI_KEY.trim();

        if (!apiKey) {
          setError("Add your OpenAI API key in the field above before generating.");
          setLoading(false);
          return;
        }

        try {
          const generated = await generateTravelPlan({
            apiKey,
            preferences,
            aiSettings
          });

          generated.destinations = await hydrateCardImages(generated.destinations);

          const featuredIndex = generated.featuredIndex || 0;
          generated.destinations[featuredIndex] = await hydrateOneDestination(generated.destinations[featuredIndex]);

          setPlan(generated);
          setSelectedIndex(featuredIndex);
        } catch (err) {
          setError(err.message || "Something went wrong while generating the plan.");
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        let cancelled = false;

        async function ensureHydrated() {
          if (!plan || !plan.destinations || !plan.destinations[selectedIndex]) return;
          const current = plan.destinations[selectedIndex];
          if (current._hydrated) return;

          const hydrated = await hydrateOneDestination(current);
          if (cancelled) return;

          setPlan((prev) => {
            if (!prev) return prev;
            const nextDestinations = [...prev.destinations];
            nextDestinations[selectedIndex] = hydrated;
            return { ...prev, destinations: nextDestinations };
          });
        }

        ensureHydrated();
        return () => {
          cancelled = true;
        };
      }, [selectedIndex, plan]);

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900">
          <div className="mx-auto max-w-7xl px-6 py-10">
            <div className="mb-8 overflow-hidden rounded-[32px] border border-slate-200 bg-white shadow-sm">
              <div className="relative h-[320px] w-full bg-gradient-to-br from-slate-900 via-slate-800 to-slate-600">
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(255,255,255,0.15),transparent_35%)]"></div>
                <div className="relative z-10 flex h-full items-end p-8 md:p-10">
                  <div className="max-w-4xl text-white">
                    <div className="mb-3 inline-flex items-center gap-2 rounded-full bg-white/10 px-3 py-1 text-sm font-medium backdrop-blur">
                      ✨ TravelMatch AI
                    </div>
                    <h1 className="text-4xl font-semibold tracking-tight md:text-5xl">
                      Let AI choose the destinations.
                    </h1>
                    <p className="mt-4 max-w-3xl text-base text-slate-200 md:text-lg">
                      Set your preference weights, choose how the AI should think, and generate destination matches with famous sights, food ideas, stays, and activity images.
                    </p>
                  </div>
                </div>
              </div>
            </div>

            <div className="grid gap-8 lg:grid-cols-[1fr_1.35fr]">
              <div className="space-y-8">
                <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                  <h2 className="text-2xl font-semibold">OpenAI connection</h2>
                  <p className="mt-1 text-sm text-slate-600">
                    Paste your API key here for this demo session.
                  </p>
                  <input
                    type="password"
                    value={apiKeyInput}
                    onChange={(e) => setApiKeyInput(e.target.value)}
                    placeholder="Paste your OpenAI API key here"
                    className="mt-4 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-slate-400"
                  />
                  <div className="mt-3 rounded-2xl bg-slate-50 p-4 text-xs leading-6 text-slate-600">
                    This page does not store the key for you. For a classroom demo on a static site, runtime paste is safer than hardcoding it into the file.
                  </div>
                </div>

                <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                  <h2 className="text-2xl font-semibold">Travel preferences</h2>
                  <p className="mt-1 text-sm text-slate-600">
                    Set your weights from 1 to 10.
                  </p>

                  <div className="mt-6 space-y-5">
                    {preferenceMeta.map((item) => (
                      <div key={item.key}>
                        <div className="mb-2 flex items-center justify-between gap-3">
                          <div className="flex items-center gap-2 text-sm font-medium text-slate-700">
                            <span>{item.emoji}</span>
                            {item.label}
                          </div>
                          <input
                            type="number"
                            min="1"
                            max="10"
                            value={preferences[item.key]}
                            onChange={(e) => handlePreferenceChange(item.key, e.target.value)}
                            className="w-20 rounded-xl border border-slate-200 px-3 py-2 text-sm text-slate-700 outline-none focus:border-slate-400"
                          />
                        </div>
                        <input
                          type="range"
                          min="1"
                          max="10"
                          value={preferences[item.key]}
                          onChange={(e) => handlePreferenceChange(item.key, e.target.value)}
                          className="h-2 w-full cursor-pointer appearance-none rounded-full bg-slate-200"
                        />
                      </div>
                    ))}
                  </div>

                  <div className="mt-5 rounded-2xl bg-slate-50 p-4 text-sm text-slate-600">
                    Strongest current priorities: <span className="font-medium text-slate-800">{topPreferenceText}</span>
                  </div>
                </div>

                <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                  <h2 className="text-2xl font-semibold">AI behavior</h2>
                  <p className="mt-1 text-sm text-slate-600">
                    Control how the AI writes and what kind of trip it emphasizes.
                  </p>

                  <div className="mt-6 grid gap-4">
                    <div>
                      <label className="mb-2 block text-sm font-medium text-slate-700">Model</label>
                      <select
                        value={aiSettings.model}
                        onChange={(e) => handleAiSettingChange("model", e.target.value)}
                        className="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-slate-400"
                      >
                        <option value="gpt-4o-mini">gpt-4o-mini</option>
                        <option value="gpt-4o">gpt-4o</option>
                      </select>
                    </div>

                    <div>
                      <label className="mb-2 block text-sm font-medium text-slate-700">
                        Creativity / Temperature: {aiSettings.temperature}
                      </label>
                      <input
                        type="range"
                        min="0"
                        max="1"
                        step="0.1"
                        value={aiSettings.temperature}
                        onChange={(e) => handleAiSettingChange("temperature", Number(e.target.value))}
                        className="h-2 w-full cursor-pointer appearance-none rounded-full bg-slate-200"
                      />
                    </div>

                    <div>
                      <label className="mb-2 block text-sm font-medium text-slate-700">Traveler type</label>
                      <select
                        value={aiSettings.travelerType}
                        onChange={(e) => handleAiSettingChange("travelerType", e.target.value)}
                        className="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-slate-400"
                      >
                        <option>solo traveler</option>
                        <option>couple</option>
                        <option>family traveler</option>
                        <option>food-focused traveler</option>
                        <option>budget traveler</option>
                        <option>luxury traveler</option>
                        <option>adventure traveler</option>
                      </select>
                    </div>

                    <div>
                      <label className="mb-2 block text-sm font-medium text-slate-700">Trip length</label>
                      <select
                        value={aiSettings.tripLength}
                        onChange={(e) => handleAiSettingChange("tripLength", e.target.value)}
                        className="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-slate-400"
                      >
                        <option>2 days</option>
                        <option>3 days</option>
                        <option>4 days</option>
                        <option>5 days</option>
                        <option>1 week</option>
                      </select>
                    </div>

                    <div>
                      <label className="mb-2 block text-sm font-medium text-slate-700">Style</label>
                      <select
                        value={aiSettings.style}
                        onChange={(e) => handleAiSettingChange("style", e.target.value)}
                        className="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-slate-400"
                      >
                        <option value="balanced">Balanced</option>
                        <option value="scenic">Scenic</option>
                        <option value="history-heavy">History-heavy</option>
                        <option value="food-focused">Food-focused</option>
                        <option value="comfort-first">Comfort-first</option>
                        <option value="high-energy">High-energy</option>
                      </select>
                    </div>

                    <div>
                      <label className="mb-2 block text-sm font-medium text-slate-700">Response length</label>
                      <select
                        value={aiSettings.responseLength}
                        onChange={(e) => handleAiSettingChange("responseLength", e.target.value)}
                        className="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-slate-400"
                      >
                        <option value="short">Short</option>
                        <option value="medium">Medium</option>
                        <option value="detailed">Detailed</option>
                      </select>
                    </div>

                    <div>
                      <label className="mb-2 block text-sm font-medium text-slate-700">Extra instructions</label>
                      <textarea
                        value={aiSettings.extraInstructions}
                        onChange={(e) => handleAiSettingChange("extraInstructions", e.target.value)}
                        placeholder="Example: prioritize walkability, avoid extreme weather, prefer places with strong public transit."
                        className="min-h-[110px] w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none placeholder:text-slate-400 focus:border-slate-400"
                      />
                    </div>

                    <button
                      onClick={handleGenerate}
                      disabled={loading}
                      className="mt-2 rounded-2xl bg-slate-900 px-4 py-3 text-sm font-medium text-white transition hover:opacity-90 disabled:opacity-50"
                    >
                      {loading ? "Generating with AI..." : "Generate Plan"}
                    </button>
                  </div>
                </div>
              </div>

              <div className="space-y-8">
                {error && (
                  <div className="rounded-3xl border border-red-200 bg-red-50 p-5 text-sm text-red-700 shadow-sm">
                    {error}
                  </div>
                )}

                {!plan && !loading && (
                  <div className="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
                    <h2 className="text-2xl font-semibold">Results will appear here</h2>
                    <p className="mt-3 max-w-2xl text-sm leading-7 text-slate-600">
                      Click Generate Plan and the AI will choose destinations based on your preferences, then the page will load famous sights and representative images for stays, food, and activities.
                    </p>
                  </div>
                )}

                {plan && (
                  <>
                    <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                      <h2 className="text-2xl font-semibold">AI destination matches</h2>
                      <p className="mt-1 text-sm text-slate-600">{plan.tripSummary}</p>

                      <div className="mt-6 space-y-4">
                        {plan.destinations.map((destination, index) => (
                          <button
                            key={destination.id}
                            onClick={() => setSelectedIndex(index)}
                            className={`w-full overflow-hidden rounded-3xl border text-left transition ${
                              selectedIndex === index
                                ? "border-slate-900 bg-slate-900 text-white"
                                : "border-slate-200 bg-white hover:border-slate-300"
                            }`}
                          >
                            <div className="grid gap-0 md:grid-cols-[220px_1fr]">
                              <img
                                src={destination.heroImage || makePlaceholder(destination.city)}
                                alt={destination.city}
                                className="h-full min-h-[180px] w-full object-cover"
                              />
                              <div className="p-5">
                                <div className="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
                                  <div className="max-w-2xl">
                                    <div className="mb-2 text-xs font-semibold uppercase tracking-[0.2em] opacity-70">
                                      #{index + 1} AI match
                                    </div>
                                    <div className="text-2xl font-semibold">
                                      📍 {destination.city}, {destination.country}
                                    </div>
                                    <p className={`mt-2 text-sm ${selectedIndex === index ? "text-slate-200" : "text-slate-600"}`}>
                                      {destination.tagline}
                                    </p>
                                    <p className={`mt-3 text-sm leading-6 ${selectedIndex === index ? "text-slate-300" : "text-slate-600"}`}>
                                      {destination.whyMatch}
                                    </p>
                                  </div>

                                  <div className="min-w-[140px] rounded-2xl border border-current/10 bg-current/5 p-4">
                                    <div className="text-sm opacity-70">Fit score</div>
                                    <div className="mt-1 text-3xl font-semibold">{destination.score || "—"}</div>
                                    <div className="mt-1 text-sm opacity-80">AI-ranked</div>
                                  </div>
                                </div>

                                <div className="mt-4 flex flex-wrap gap-2">
                                  {(destination.highlights || []).map((highlight, i) => (
                                    <span
                                      key={`${highlight}-${i}`}
                                      className={`rounded-full px-3 py-1 text-xs font-medium ${
                                        selectedIndex === index
                                          ? "bg-white/10 text-white"
                                          : "bg-slate-100 text-slate-700"
                                      }`}
                                    >
                                      {highlight}
                                    </span>
                                  ))}
                                </div>
                              </div>
                            </div>
                          </button>
                        ))}
                      </div>
                    </div>

                    {activeDestination && (
                      <>
                        <div className="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
                          <div
                            className="relative h-[300px] w-full bg-cover bg-center"
                            style={{
                              backgroundImage: `url(${activeDestination.heroImage || makePlaceholder(activeDestination.city)})`
                            }}
                          >
                            <div className="absolute inset-0 bg-gradient-to-r from-slate-950/80 via-slate-900/45 to-transparent"></div>
                            <div className="relative z-10 flex h-full items-end p-8">
                              <div className="max-w-3xl text-white">
                                <div className="mb-2 inline-flex items-center gap-2 rounded-full bg-white/10 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] backdrop-blur">
                                  Featured destination
                                </div>
                                <h2 className="text-4xl font-semibold">
                                  {activeDestination.city}, {activeDestination.country}
                                </h2>
                                <p className="mt-3 max-w-2xl text-sm leading-7 text-slate-200">
                                  {activeDestination.whyMatch}
                                </p>
                              </div>
                            </div>
                          </div>
                        </div>

                        <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                          <h3 className="text-2xl font-semibold">Famous views and landmarks</h3>
                          <p className="mt-1 text-sm text-slate-600">
                            AI-selected visual highlights for this destination.
                          </p>
                          <div className="mt-5 grid gap-5 md:grid-cols-2 xl:grid-cols-4">
                            {(activeDestination.landmarks || []).map((item, idx) => (
                              <div key={`${item.name}-${idx}`} className="overflow-hidden rounded-2xl border border-slate-200 bg-white">
                                <img
                                  src={item.image || makePlaceholder(item.name)}
                                  alt={item.name}
                                  className="h-44 w-full object-cover"
                                />
                                <div className="p-4">
                                  <div className="flex items-center justify-between gap-3">
                                    <h4 className="font-semibold text-slate-900">{item.name}</h4>
                                    <span className="rounded-full bg-slate-100 px-2.5 py-1 text-xs text-slate-600">
                                      {item.type}
                                    </span>
                                  </div>
                                  <p className="mt-3 text-sm leading-6 text-slate-600">{item.note}</p>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>

                        <SectionGrid
                          title="Transportation"
                          description="AI-selected arrival and movement options for this destination."
                          items={activeDestination.transportation}
                        />

                        <SectionGrid
                          title="Stay recommendations"
                          description="Representative hotel or stay styles selected by AI."
                          items={activeDestination.stays}
                        />

                        <SectionGrid
                          title="Food recommendations"
                          description="Representative food experiences selected by AI."
                          items={activeDestination.foods}
                        />

                        <SectionGrid
                          title="Events and activities"
                          description="Experience ideas selected by AI."
                          items={activeDestination.activities}
                        />

                        <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                          <h2 className="text-2xl font-semibold">{plan.itineraryTitle}</h2>
                          <p className="mt-1 text-sm text-slate-600">
                            AI-generated plan for the featured destination.
                          </p>
                          <div className="mt-4 whitespace-pre-wrap rounded-2xl border border-slate-200 bg-slate-50 p-5 text-sm leading-7 text-slate-700">
                            {plan.itinerary}
                          </div>
                        </div>
                      </>
                    )}
                  </>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
