    const destinations = [

          { name: "Pastéis de nata route", cuisine: "Dessert", note: "Easy and iconic food activity." },

          { name: "Fado night", category: "Cultural event", note: "Adds emotional depth and local identity." },
        ],
        reviews: [
          { user: "Sofia", persona: "Scenic Explorer", rating: 5, text: "Lisbon is one of those places where even walking to dinner becomes a scenic experience.", tags: ["views", "walking", "atmosphere"] },

        ],

      {

        city: "Quebec City",
        country: "Canada",
        tagline: "Compact charm, old-world streets, winter atmosphere, and approachable history.",
        summary:
          "Quebec City is a strong fit for travelers who want a compact, scenic, and historically rich destination that feels easier to navigate than larger global cities.",
        scores: { views: 8, history: 9, food: 8, events: 7, activities: 7, safety: 9, nightlife: 5, budget: 6 },
        highlights: ["Old Quebec", "Fortifications", "French-Canadian cuisine", "Seasonal festivals"],
        transportation: [

        ],
        residences: [

        ],

        ],

          { name: "Winter carnival", category: "Event", note: "High seasonal value if timed correctly." },
          { name: "River and terrace viewpoint loop", category: "Scenic", note: "Ideal for users prioritizing architecture and views." },
        ],
        reviews: [
          { user: "Claire", persona: "History Lover", rating: 5, text: "It felt historical without being overwhelming.", tags: ["history", "compact", "walkability"] },
          { user: "Ben", persona: "Family Traveler", rating: 5, text: "Very comfortable for a family trip.", tags: ["family", "safety", "easy planning"] },
          { user: "Grace", persona: "Budget Traveler", rating: 4, text: "It was not ultra-cheap, but I saved money by keeping the trip compact.", tags: ["budget", "compact", "planning"] },
          { user: "Ryan", persona: "Scenic Explorer", rating: 4, text: "The architecture and riverside views were beautiful.", tags: ["views", "architecture", "seasonality"] },
        ],
      },
      {
        id: "istanbul",
        city: "Istanbul",
        country: "Türkiye",
        tagline: "Layered history, iconic skylines, rich food culture, and nonstop energy.",
        summary:
          "Istanbul is a high-intensity, high-reward option for travelers who want history, food, architecture, and cultural contrast in one trip.",
        scores: { views: 9, history: 10, food: 10, events: 8, activities: 9, safety: 6, nightlife: 8, budget: 8 },
        highlights: ["Ottoman and Byzantine sites", "Bosphorus views", "Street food and markets", "Deep cultural layering"],
        transportation: [
          { name: "Istanbulkart transit pass", type: "Transit", note: "Best value for ferries, metro, and trams." },
          { name: "Bosphorus ferry routes", type: "Scenic transit", note: "Useful transport that also functions as an activity." },
          { name: "Airport shuttle + metro combo", type: "Arrival", note: "Lower-cost arrival option if planned carefully." },
        ],
        residences: [
          { name: "Sultanahmet boutique hotel", type: "Historic stay", note: "Best for site-heavy itineraries." },
          { name: "Karaköy design hotel", type: "Balanced stay", note: "Good mix of food, views, and city energy." },
          { name: "Kadıköy local stay", type: "Neighborhood stay", note: "Better for food-focused repeat travelers." },
        ],
        foods: [
          { name: "Meyhane dinner", cuisine: "Traditional dining", note: "Strong fit for immersive food experiences." },
          { name: "Street food circuit", cuisine: "Street food", note: "Very high-value food exploration option." },
          { name: "Baklava and tea stops", cuisine: "Dessert", note: "Easy add-on to a history-based itinerary." },
        ],
        eventsAndActivities: [
          { name: "Hagia Sophia + Blue Mosque route", category: "History", note: "Best first-day anchor for historical travelers." },
          { name: "Bosphorus sunset ferry", category: "Scenic", note: "High-value view experience with cultural atmosphere." },
          { name: "Grand Bazaar exploration", category: "Activity", note: "Good for energy, food, and sensory immersion." },
        ],
        reviews: [
          { user: "Ava", persona: "Foodie", rating: 5, text: "Istanbul may be the most complete food city I have visited.", tags: ["food", "markets", "variety"] },
          { user: "Leo", persona: "History Lover", rating: 5, text: "The historical density is astonishing.", tags: ["history", "architecture", "depth"] },
          { user: "Zoe", persona: "Solo Traveler", rating: 4, text: "Amazing trip, but it required more energy and awareness than some other cities.", tags: ["solo", "planning", "energy"] },
          { user: "Ethan", persona: "Budget Traveler", rating: 5, text: "For the amount of food, history, and visual impact you get, it feels like excellent value.", tags: ["budget", "value", "food"] },
        ],
      },
    ];

    const initialPreferences = {
      views: 5,
      history: 5,
      food: 5,
      events: 5,
      activities: 5,
      safety: 5,
      nightlife: 5,
      budget: 5,
    };

    function getMatchLabel(score) {
      if (score >= 88) return "Excellent match";
      if (score >= 76) return "Strong match";
      if (score >= 64) return "Good match";
      return "Moderate match";
    }

    function getTopReasons(preferences, destinationScores) {
      return [...preferenceMeta]
        .map((item) => ({
          key: item.key,
          label: item.label,
          contribution: preferences[item.key] * destinationScores[item.key],
        }))
        .sort((a, b) => b.contribution - a.contribution)
        .slice(0, 3);
    }

    function buildAISummary(destination, topReasons) {
      const reasonText = topReasons.map((r) => r.label.toLowerCase()).join(", ");
      return `${destination.city} is surfacing as a top option because your preference profile places strong weight on ${reasonText}. Compared with other destinations in the dataset, it offers one of the best overall tradeoffs for the things you care about most.`;
    }

    function buildReviewInsight(destination, selectedPersona, preferences) {
      const relevantReviews = destination.reviews.filter(
        (review) => selectedPersona === "All" || review.persona === selectedPersona
      );
      const avg = relevantReviews.reduce((sum, review) => sum + review.rating, 0) / Math.max(relevantReviews.length, 1);
      const topPreference = [...preferenceMeta].sort((a, b) => preferences[b.key] - preferences[a.key])[0]?.label;
      const personaText = selectedPersona === "All" ? "across traveler types" : `among ${selectedPersona.toLowerCase()}s`;
      return `AI review insight: ${destination.city} performs well ${personaText}, with an average review rating of ${avg.toFixed(1)}/5 in the current prototype data. The most relevant signal for this user is ${topPreference.toLowerCase()}, so the most valuable reviews are the ones discussing whether the destination actually delivers that experience rather than simply whether it is popular overall.`;
    }

    function SectionCard({ title, description, items, itemTitleKey, itemMetaKey, itemNoteKey }) {
      return (
        <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
          <h3 className="text-2xl font-semibold">{title}</h3>
          <p className="mt-1 text-sm text-slate-600">{description}</p>
          <div className="mt-4 space-y-4">
            {items.map((item) => (
              <div key={`${item[itemTitleKey]}-${item[itemMetaKey]}`} className="rounded-2xl border border-slate-200 p-4">
                <div className="flex flex-col gap-1 md:flex-row md:items-center md:justify-between">
                  <div className="font-medium text-slate-900">{item[itemTitleKey]}</div>
                  <div className="text-sm text-slate-500">{item[itemMetaKey]}</div>
                </div>
                <p className="mt-2 text-sm leading-6 text-slate-700">{item[itemNoteKey]}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [preferences, setPreferences] = useState(initialPreferences);
      const [selectedDestinationId, setSelectedDestinationId] = useState(null);
      const [selectedPersona, setSelectedPersona] = useState("All");
      const [savedTrips, setSavedTrips] = useState([]);
      const [tripFeedback, setTripFeedback] = useState("");

      const rankedDestinations = useMemo(() => {
        const maxPossible = preferenceMeta.reduce((sum, item) => sum + preferences[item.key] * 10, 0);
        return destinations
          .map((destination) => {
            const rawScore = preferenceMeta.reduce(
              (sum, item) => sum + preferences[item.key] * destination.scores[item.key],
              0
            );
            const percentage = Math.round((rawScore / maxPossible) * 100);
            const topReasons = getTopReasons(preferences, destination.scores);
            return {
              ...destination,
              matchScore: percentage,
              matchLabel: getMatchLabel(percentage),
              topReasons,
              aiSummary: buildAISummary(destination, topReasons),
            };
          })
          .sort((a, b) => b.matchScore - a.matchScore);
      }, [preferences]);

      const selectedDestination = rankedDestinations.find((d) => d.id === selectedDestinationId) || rankedDestinations[0];

      const filteredReviews = selectedDestination.reviews.filter(
        (review) => selectedPersona === "All" || review.persona === selectedPersona
      );

      const handlePreferenceChange = (key, value) => {
        setPreferences((prev) => ({ ...prev, [key]: Number(value) }));
      };

      const handleSaveTrip = () => {
        if (!selectedDestination) return;
        if (savedTrips.some((trip) => trip.id === selectedDestination.id)) return;
        setSavedTrips((prev) => [...prev, { id: selectedDestination.id, city: selectedDestination.city, country: selectedDestination.country }]);
      };

      const applyFeedbackProfile = () => {
        const text = tripFeedback.toLowerCase();
        const updates = { ...preferences };
        if (text.includes("more food") || text.includes("foodie")) updates.food = Math.min(10, updates.food + 1);
        if (text.includes("more safe") || text.includes("safer")) updates.safety = Math.min(10, updates.safety + 1);
        if (text.includes("more history") || text.includes("historical")) updates.history = Math.min(10, updates.history + 1);
        if (text.includes("more views") || text.includes("scenic")) updates.views = Math.min(10, updates.views + 1);
        if (text.includes("cheaper") || text.includes("budget")) updates.budget = Math.min(10, updates.budget + 1);
        if (text.includes("more nightlife")) updates.nightlife = Math.min(10, updates.nightlife + 1);
        setPreferences(updates);
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900">
          <div className="mx-auto max-w-7xl px-6 py-10">
            <div className="mb-8 rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
              <div className="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
                <div className="max-w-3xl">
                  <div className="mb-3 inline-flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1 text-sm font-medium text-slate-700">
                    ✨ TravelMatch AI Prototype
                  </div>
                  <h1 className="text-4xl font-semibold tracking-tight">Taste-based travel recommendations, not just search results.</h1>
                  <p className="mt-4 text-lg text-slate-600">
                    This prototype matches destinations to a traveler’s preference profile, explains why each place fits, and organizes hotels, transport, food, activities, and reviews around that same taste model.
                  </p>
                </div>
                <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
                  <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                    <div className="text-sm text-slate-500">Top current match</div>
                    <div className="mt-1 text-xl font-semibold">{rankedDestinations[0]?.city}</div>
                    <div className="text-sm text-slate-600">{rankedDestinations[0]?.country}</div>
                  </div>
                  <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                    <div className="text-sm text-slate-500">Saved destinations</div>
                    <div className="mt-1 text-xl font-semibold">{savedTrips.length}</div>
                    <div className="text-sm text-slate-600">Prototype shortlist</div>
                  </div>
                </div>
              </div>
            </div>

            <div className="grid gap-8 lg:grid-cols-[1.05fr_1.35fr]">
              <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <div className="mb-6">
                  <h2 className="text-2xl font-semibold">Build your travel profile</h2>
                  <p className="text-sm text-slate-600">Adjust how important each factor is to you from 1 to 10.</p>
                </div>

                <div className="space-y-5">
                  {preferenceMeta.map((item) => (
                    <div key={item.key}>
                      <div className="mb-2 flex items-center justify-between">
                        <div className="flex items-center gap-2 text-sm font-medium text-slate-700">
                          <span>{item.emoji}</span>
                          {item.label}
                        </div>
                        <div className="rounded-full bg-slate-100 px-3 py-1 text-sm font-semibold text-slate-700">
                          {preferences[item.key]}
                        </div>
                      </div>
                      <input
                        type="range"
                        min="1"
                        max="10"
                        value={preferences[item.key]}
                        onChange={(e) => handlePreferenceChange(item.key, e.target.value)}
                        className="h-2 w-full cursor-pointer appearance-none rounded-full bg-slate-200"
                      />
                    </div>
                  ))}
                </div>
              </div>

              <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <div className="mb-6 flex items-center justify-between gap-4">
                  <div>
                    <h2 className="text-2xl font-semibold">AI destination matches</h2>
                    <p className="text-sm text-slate-600">The system ranks destinations by fit score and highlights the top reasons.</p>
                  </div>
                  <button
                    onClick={handleSaveTrip}
                    className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white transition hover:opacity-90"
                  >
                    Save selected trip
                  </button>
                </div>

                <div className="space-y-4">
                  {rankedDestinations.map((destination, index) => (
                    <button
                      key={destination.id}
                      onClick={() => setSelectedDestinationId(destination.id)}
                      className={`w-full rounded-3xl border p-5 text-left transition ${selectedDestination.id === destination.id ? "border-slate-900 bg-slate-900 text-white" : "border-slate-200 bg-white hover:border-slate-300"}`}
                    >
                      <div className="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
                        <div className="max-w-2xl">
                          <div className="mb-2 text-xs font-semibold uppercase tracking-[0.2em] opacity-70">#{index + 1} ranked match</div>
                          <div className="text-2xl font-semibold">📍 {destination.city}, {destination.country}</div>
                          <p className={`mt-2 text-sm ${selectedDestination.id === destination.id ? "text-slate-200" : "text-slate-600"}`}>{destination.tagline}</p>
                          <p className={`mt-3 text-sm leading-6 ${selectedDestination.id === destination.id ? "text-slate-300" : "text-slate-600"}`}>{destination.aiSummary}</p>
                        </div>

                        <div className="min-w-[180px] rounded-2xl border border-current/10 bg-current/5 p-4">
                          <div className="text-sm opacity-70">Match score</div>
                          <div className="mt-1 text-3xl font-semibold">{destination.matchScore}%</div>
                          <div className="mt-1 text-sm opacity-80">{destination.matchLabel}</div>
                        </div>
                      </div>

                      <div className="mt-4 flex flex-wrap gap-2">
                        {destination.topReasons.map((reason) => (
                          <span key={reason.key} className={`rounded-full px-3 py-1 text-xs font-medium ${selectedDestination.id === destination.id ? "bg-white/10 text-white" : "bg-slate-100 text-slate-700"}`}>
                            Strong for {reason.label}
                          </span>
                        ))}
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <div className="mt-8 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <div className="flex flex-col gap-5 lg:flex-row lg:items-start lg:justify-between">
                <div className="max-w-3xl">
                  <div className="mb-2 inline-flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-slate-700">
                    Selected destination
                  </div>
                  <h2 className="text-3xl font-semibold">{selectedDestination.city}, {selectedDestination.country}</h2>
                  <p className="mt-3 text-slate-600">{selectedDestination.summary}</p>
                  <div className="mt-4 flex flex-wrap gap-2">
                    {selectedDestination.highlights.map((item) => (
                      <span key={item} className="rounded-full bg-slate-100 px-3 py-1 text-sm text-slate-700">{item}</span>
                    ))}
                  </div>
                </div>
                <div className="rounded-2xl border border-slate-200 bg-slate-50 p-5 lg:w-[280px]">
                  <div className="text-sm text-slate-500">AI fit explanation</div>
                  <p className="mt-2 text-sm leading-6 text-slate-700">
                    {selectedDestination.city} stands out because your strongest preferences align with this destination’s highest category scores. The recommendation is not based only on popularity. It is based on weighted fit and the tradeoff balance between your priorities.
                  </p>
                </div>
              </div>
            </div>

            <div className="mt-8 grid gap-8 xl:grid-cols-[1.2fr_0.8fr]">
              <div className="space-y-8">
                <SectionCard title="Transportation" description="How the system would recommend arrival and local movement options after destination selection." items={selectedDestination.transportation} itemTitleKey="name" itemMetaKey="type" itemNoteKey="note" />
                <SectionCard title="Residence" description="Prototype stay recommendations based on convenience, style, and user fit." items={selectedDestination.residences} itemTitleKey="name" itemMetaKey="type" itemNoteKey="note" />
                <SectionCard title="Food" description="Food recommendations tied to destination identity rather than only star ratings." items={selectedDestination.foods} itemTitleKey="name" itemMetaKey="cuisine" itemNoteKey="note" />
                <SectionCard title="Events and activities" description="Things to do once a place is selected, organized around why the destination was recommended in the first place." items={selectedDestination.eventsAndActivities} itemTitleKey="name" itemMetaKey="category" itemNoteKey="note" />
              </div>

              <div className="space-y-8">
                <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                  <h3 className="text-2xl font-semibold">Review intelligence</h3>
                  <p className="mt-1 text-sm text-slate-600">Reviews are filtered by traveler type, not only pooled together.</p>

                  <div className="mt-4 flex flex-wrap gap-2">
                    {travelerPersonas.map((persona) => (
                      <button
                        key={persona}
                        onClick={() => setSelectedPersona(persona)}
                        className={`rounded-full px-3 py-2 text-sm transition ${selectedPersona === persona ? "bg-slate-900 text-white" : "bg-slate-100 text-slate-700 hover:bg-slate-200"}`}
                      >
                        {persona}
                      </button>
                    ))}
                  </div>

                  <div className="mt-4 rounded-2xl bg-slate-50 p-4 text-sm leading-6 text-slate-700">
                    {buildReviewInsight(selectedDestination, selectedPersona, preferences)}
                  </div>

                  <div className="mt-5 space-y-4">
                    {filteredReviews.map((review) => (
                      <div key={`${review.user}-${review.text}`} className="rounded-2xl border border-slate-200 p-4">
                        <div className="flex items-start justify-between gap-4">
                          <div>
                            <div className="font-medium">{review.user}</div>
                            <div className="text-sm text-slate-500">{review.persona}</div>
                          </div>
                          <div className="text-sm font-medium text-slate-700">⭐ {review.rating}/5</div>
                        </div>
                        <p className="mt-3 text-sm leading-6 text-slate-700">{review.text}</p>
                        <div className="mt-3 flex flex-wrap gap-2">
                          {review.tags.map((tag) => (
                            <span key={tag} className="rounded-full bg-slate-100 px-2.5 py-1 text-xs text-slate-600">{tag}</span>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                  <h3 className="text-2xl font-semibold">Learning loop</h3>
                  <p className="mt-1 text-sm text-slate-600">A simple prototype of how the system could update taste over time.</p>
                  <textarea
                    value={tripFeedback}
                    onChange={(e) => setTripFeedback(e.target.value)}
                    placeholder="Example: I want more food and views next time, but I also want somewhere safer and cheaper."
                    className="mt-4 min-h-[140px] w-full rounded-2xl border border-slate-200 p-4 text-sm outline-none placeholder:text-slate-400 focus:border-slate-400"
                  />
                  <button onClick={applyFeedbackProfile} className="mt-4 rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white transition hover:opacity-90">
                    Update my profile from feedback
                  </button>

                  <div className="mt-5 rounded-2xl bg-slate-50 p-4">
                    <div className="text-sm font-medium text-slate-700">Saved shortlist</div>
                    <div className="mt-3 space-y-2">
                      {savedTrips.length === 0 ? (
                        <div className="text-sm text-slate-500">No saved trips yet.</div>
                      ) : (
                        savedTrips.map((trip) => (
                          <div key={trip.id} className="flex items-center justify-between rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm">
                            <span>{trip.city}, {trip.country}</span>
                            <span>📍</span>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
